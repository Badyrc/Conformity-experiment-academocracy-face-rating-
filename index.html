<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Combined Experiment</title>

<script src="https://unpkg.com/jspsych@7.3.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.2"></script>

<link href="https://unpkg.com/jspsych@7.3.0/css/jspsych.css" rel="stylesheet" />

<style>
body { font-size: 18px; }
.instructions { max-width: 800px; margin: auto; text-align: center; }
</style>
</head>

<body></body>

<script>
const jsPsych = initJsPsych();

// --- CONDITION RANDOMIZATION ---
const conditions = ["podrostok", "vzrosliy", "control"];
const condition = conditions[Math.floor(Math.random()*conditions.length)];

// --- INSTRUCTIONS (RUSSIAN) ---
const instructions = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
    <div class="instructions">
    <p>Добро пожаловать!</p>
    <p>В этом эксперименте вам нужно будет оценивать привлекательность лиц.</p>
    <p>Сначала в центре экрана появится лицо.</p>
    <p>После того как лицо исчезнет, в центре экрана будет показана оценка других участников.</p>
    <p>Зелёный квадрат показывает, какую оценку поставило большинство других участников.</p>
    <p>Вам нужно оценить лицо по шкале от 1 до 9.</p>
    <p>Пожалуйста, старайтесь давать оценку как можно быстрее.</p>
    <p>Нажмите ПРОБЕЛ, чтобы начать.</p>
    </div>
    `,
    choices: [" "]
};

// --- POST PRACTICE MESSAGE ---
const postPractice = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
    <div class="instructions">
    <p>Тренировочная часть завершена.</p>
    <p>Если всё понятно, нажмите ПРОБЕЛ.</p>
    </div>
    `,
    choices: [" "]
};

// --- SAMPLE TRIAL ---
const trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<p>Нажмите цифру от 1 до 9</p>',
    choices: ["1","2","3","4","5","6","7","8","9"]
};

// --- TIMELINE ---
jsPsych.run([
    instructions,
    trial,
    postPractice,
    trial
]);

</script>

</html>
