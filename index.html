    ingroup: "podrostok",

};
var DEBUG_CONDITION = "";
function assignCondition() {
    var pool = ["ingroup", "outgroup", "no_elimination"];
    return pool[Math.floor(Math.random() * pool.length)];
}
DEBUG_CONDITION = assignCondition();
var RESPONSES_REQUIRED = false;
var STAGE1_PARTICIPANT_ID = '';
var STAGE2_URL = '';
var DEMO_GENDER_LABEL = '';
var DEMO_GENDER_CODE = '';
var PARTICIPANT_GENDER_TEXT = '';
var GOOGLE_SHEETS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz8A-YGjg735zM76TYyGh4LipI5cUx93zQJlujaN570CdBnDHsrMW3_f9R7cYX2Vmwq/exec';

function safeJsonParse(value, fallback) {
    try {
        return typeof value === 'string' ? JSON.parse(value) : (value || fallback);
    } catch (e) {
        return fallback;
    }
}

function postPayloadToGoogleSheets(payload) {
    var body = JSON.stringify(payload);

    try {
        if (navigator.sendBeacon) {
            var blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
            var beaconSent = navigator.sendBeacon(GOOGLE_SHEETS_WEB_APP_URL, blob);
            if (beaconSent) {
                return Promise.resolve({ sent: true, transport: 'beacon' });
            }
        }
    } catch (e) {}

    return fetch(GOOGLE_SHEETS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: body,
        keepalive: true,
        credentials: 'omit'
    }).then(function() {
        return { sent: true, transport: 'fetch' };
    });
}

function buildStage1FormattedRow(participantId, ageRaw, sexRaw) {
    var allTrials = jsPsych.data.get().values();
    var row = {
        participant_id: participantId,
        stage: 'stage1',
        selected_condition: DEBUG_CONDITION,
        selected_condition_label: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION,
        age: ageRaw || '',
        sex: PARTICIPANT_GENDER_TEXT || sexRaw || DEMO_GENDER_LABEL || '',
        
        
        gender_code: DEMO_GENDER_CODE || ''
    };

    for (var rr = 0; rr < ranked.length; rr++) {
        row['ranking_' + (rr + 1)] = ranked[rr] || '';
    }

    for (var i = 0; i < allTrials.length; i++) {
        var trial = allTrials[i];

        if (trial.trial_type === 'ranking_result') {
            for (var r = 1; r <= 9; r++) {
                row['ranking_' + r] = trial['ranking_' + r] || '';
            }
        }

        if (trial.trial_type === 'gender_result') {
            row.sex = trial.sex || trial.gender_label || PARTICIPANT_GENDER_TEXT || row.sex || '';
            row.gender_code = trial.gender_code || row.gender_code || '';
        }

        if (trial.trial_type === 'survey-text') {
            var textResp = safeJsonParse(trial.responses, safeJsonParse(trial.response, {}));
            if (trial.questionnaire_section === 'paraphrase_task') {
                row.paraphrase_1 = textResp.Q0 || '';
                row.paraphrase_2 = textResp.Q1 || '';
                row.paraphrase_3 = textResp.Q2 || '';
            } else if (trial.questionnaire_section === 'demographics') {
                row.age = textResp.Q0 || row.age || '';
                row.class_or_course = textResp.Q1 || row.class_or_course || '';
                row.city = textResp.Q2 || row.city || '';
            }
        }

        if (trial.questionnaire_item === 'gender' && trial.questionnaire_section === 'demographics_gender') {
            var genderResp = safeJsonParse(trial.responses, safeJsonParse(trial.response, {}));
            var genderIdx = genderResp.Q0 !== undefined ? Number(genderResp.Q0) : -1;
            var genderFromResponse = genderIdx === 0 ? 'Мужской' : (genderIdx === 1 ? 'Женский' : '');
            var genderCodeFromResponse = genderIdx === 0 ? 'male' : (genderIdx === 1 ? 'female' : '');
            row.sex = trial.gender_label || trial.sex || PARTICIPANT_GENDER_TEXT || DEMO_GENDER_LABEL || genderFromResponse || row.sex || '';
            row.gender_code = trial.gender_code || DEMO_GENDER_CODE || genderCodeFromResponse || row.gender_code || '';
        }

        if (trial.trial_type === 'survey-likert') {
            var likertResp = safeJsonParse(trial.responses, safeJsonParse(trial.response, {}));

            if (trial.questionnaire_section === 'demographics_gender') {
                var genderIdxLikert = likertResp.Q0 !== undefined ? Number(likertResp.Q0) : -1;
                row.sex = genderIdxLikert === 0 ? 'Мужской' : (genderIdxLikert === 1 ? 'Женский' : row.sex || '');
                row.gender_code = genderIdxLikert === 0 ? 'male' : (genderIdxLikert === 1 ? 'female' : row.gender_code || '');
            }

            if (trial.questionnaire_section === 'PAKR') {
                for (var p = 0; p < 24; p++) {
                    row['pakr_q' + (p + 1)] = likertResp['Q' + p] !== undefined ? Number(likertResp['Q' + p]) + 1 : '';
                }
                row.pakr_autonomy_mean = trial.pakr_autonomy_mean || '';
                row.pakr_control_mean = trial.pakr_control_mean || '';
                row.pakr_total_mean = trial.pakr_total_mean || '';
            }

            if (trial.questionnaire_section === 'Basic Psychological Need Satisfaction 21') {
                for (var b = 0; b < 21; b++) {
                    row['bpns21_q' + (b + 1)] = likertResp['Q' + b] !== undefined ? Number(likertResp['Q' + b]) + 1 : '';
                }
                row.bpns21_autonomy_mean = trial.bpns21_autonomy_mean || '';
                row.bpns21_competence_mean = trial.bpns21_competence_mean || '';
                row.bpns21_relatedness_mean = trial.bpns21_relatedness_mean || '';
                row.bpns21_total_raw_mean = trial.bpns21_total_raw_mean || '';
            }

            if (trial.questionnaire_section === 'Hong Reactance Scale') {
                for (var h = 0; h < 14; h++) {
                    row['reactance_q' + (h + 1)] = likertResp['Q' + h] !== undefined ? Number(likertResp['Q' + h]) + 1 : '';
                }
                row.reactance_norm_mean = trial.reactance_norm_mean || '';
                row.reactance_independence_mean = trial.reactance_independence_mean || '';
                row.reactance_resistance_mean = trial.reactance_resistance_mean || '';
                row.reactance_emotional_mean = trial.reactance_emotional_mean || '';
                row.reactance_total_mean = trial.reactance_total_mean || '';
            }

            if (trial.questionnaire_section === 'Sharov Deviant Activity') {
                for (var d = 0; d < 28; d++) {
                    row['deviant_q' + (d + 1)] = likertResp['Q' + d] !== undefined ? Number(likertResp['Q' + d]) + 1 : '';
                }
            }

            if (trial.questionnaire_section === 'Individualism Collectivism 16') {
                for (var ic = 0; ic < 16; ic++) {
                    row['indcol_q' + (ic + 1)] = likertResp['Q' + ic] !== undefined ? Number(likertResp['Q' + ic]) + 1 : '';
                }
            }

            if (trial.questionnaire_section === 'Food Importance') {
                row.food_importance_q1 = likertResp.Q0 !== undefined ? Number(likertResp.Q0) + 1 : '';
            }

            if (trial.questionnaire_section === 'SCM' && trial.scm_group) {
                for (var s = 0; s < 6; s++) {
                    row['scm_' + trial.scm_group + '_q' + (s + 1)] = likertResp['Q' + s] !== undefined ? Number(likertResp['Q' + s]) + 1 : '';
                }
                row['scm_' + trial.scm_group + '_warmth_mean'] = trial.scm_warmth_mean || trial['scm_' + trial.scm_group + '_warmth_mean'] || '';
                row['scm_' + trial.scm_group + '_competence_mean'] = trial.scm_competence_mean || trial['scm_' + trial.scm_group + '_competence_mean'] || '';
            }

            if (trial.rating_type === 'personal_liking' && trial.dish_index !== undefined) {
                row['personal_liking_' + (Number(trial.dish_index) + 1)] = likertResp.Q0 !== undefined ? Number(likertResp.Q0) + 1 : '';
                row['personal_liking_' + (Number(trial.dish_index) + 1) + '_dish'] = trial.dish || '';
            }

            if (trial.rating_type === 'expected_pleasure' && trial.dish_index !== undefined) {
                row['expected_pleasure_' + (Number(trial.dish_index) + 1)] = likertResp.Q0 !== undefined ? Number(likertResp.Q0) + 1 : '';
                row['expected_pleasure_' + (Number(trial.dish_index) + 1) + '_dish'] = trial.dish || '';
            }
        }
    }

    return row;
}

function sendStage1DataToGoogleSheets(participantId, ageRaw, sexRaw) {
    var rawRows = jsPsych.data.get().values();
    var formattedRow = buildStage1FormattedRow(participantId, ageRaw, sexRaw);
    return postPayloadToGoogleSheets({
        stage: 'stage1',
        participant_id: participantId,
        age: ageRaw || '',
        sex: PARTICIPANT_GENDER_TEXT || sexRaw || DEMO_GENDER_LABEL || '',
        
        
        gender_code: DEMO_GENDER_CODE || '',
        condition: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION,
        raw_rows: rawRows,
        formatted_row: formattedRow
    });
}


        // -

        function renderRankingUI(container) {

            let html = `
              <div class="box ranking-box">

            `;

            ranked.forEach((item, i) => {
                html += `
                  <div class="slot" data-index="${i}">
                    <div class="slot-number">${i + 1}</div>
                    <div class="slot-content">
                      ${item ? `<div class="item" draggable="true">${item}</div>` : ""}
                    </div>
                  </div>
                `;
            });

            html += `
                  </div>

                  <div class="panel" id="poolPanel">
                    <h4>Доступные блюда</h4>
            `;

            unranked.forEach(item => {
                html += `<div class="item" draggable="true">${item}</div>`;
            });

            html += `
                  </div>
                </div>

                <br>
                <button id="rankContinue">Продолжить</button>
              </div>
            `;

            container.innerHTML = html;

            enableDnD(container);
            wireContinue(container);
        }

        // -
        // Drag and drop
        // -

        function enableDnD(container) {

            let dragged = null;

            container.querySelectorAll(".item").forEach(item => {
                item.addEventListener("dragstart", () => dragged = item.innerText);
            });

            container.querySelectorAll(".slot").forEach(slot => {

                slot.addEventListener("dragover", e => {
                    e.preventDefault();
                    slot.classList.add("drag-over");
                });

                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));

                slot.addEventListener("drop", e => {
                    e.preventDefault();
                    slot.classList.remove("drag-over");

                    if (!dragged) return;

                    const idx = parseInt(slot.dataset.index);

                    ranked = ranked.map(x => x === dragged ? null : x);
                    unranked = unranked.filter(x => x !== dragged);

                    if (ranked[idx]) {
                        unranked.push(ranked[idx]);
                    }

                    ranked[idx] = dragged;

                    renderRankingUI(container);
                });

            });

            const pool = container.querySelector("#poolPanel");

            pool.addEventListener("dragover", e => e.preventDefault());

            pool.addEventListener("drop", e => {
                e.preventDefault();

                if (!dragged) return;

                ranked = ranked.map(x => x === dragged ? null : x);

                if (!unranked.includes(dragged)) {
                    unranked.push(dragged);
                }

                renderRankingUI(container);
            });

        }

        // -
        // Continue button
        // -

        function wireContinue(container) {

            container.querySelector("#rankContinue").onclick = function () {

                if (ranked.includes(null)) {
                    alert("Пожалуйста, расположите все блюда перед тем как продолжить.");
                    return;
                }

                jsPsych.finishTrial();
            };
        }

                html += " <button id='backBtn'>Вернуться и изменить</button>";

                };

                document.getElementById('backBtn').onclick = function () {
                    MUST_LOOP_BACK = true;
                    jsPsych.finishTrial();
                };
            }
        };



var auto_condition_trial = {

function getStatisticsAnnotation() {
    var allTrials = jsPsych.data.get().values();
    var age = "";

    for (var i = 0; i < allTrials.length; i++) {
        var trial = allTrials[i];

        if (trial.questionnaire_section === "demographics" && trial.trial_type === "survey-text") {
            var resp = safeJsonParse(trial.responses, safeJsonParse(trial.response, {}));
            age = resp.Q0 || "";
            break;
        }
    }

    var ageText = age ? " (" + age + " лет)" : "";

    if (DEBUG_CONDITION === "ingroup") {
        return "По предварительным результатам голосования других школьников" + ageText + " эти блюда, скорее всего, не будут включены в итоговый вариант школьного меню.";
    }

    if (DEBUG_CONDITION === "outgroup") {
        return "По предварительным результатам голосования родителей школьников и учителей школ эти блюда, скорее всего, не будут включены в итоговый вариант школьного меню.";
    }

    return "По предварительным результатам эти блюда, скорее всего, не будут включены в итоговый вариант школьного меню.";
}
