    <script>

        // -
        // State
        // -

        var dishes = [
            "Булгур с индейкой",
            "Пюре с куриными котлетами",
            "Гречка с тефтелями",
            "Рис с курицей",
            "Овощной суп",
            "Макароны с сыром",
            "Запечённая рыба с картофелем",
            "Плов с курицей",
            "Творожная запеканка"
        ];

        var ranked = new Array(dishes.length).fill(null);
        var unranked = [...dishes];

        var MUST_LOOP_BACK = false;
        var CONDITION_MAP = {
    ingroup: "podrostok",
    outgroup: "vzrosliy",
    no_elimination: "control"
};
var DEBUG_CONDITION = "";
function assignCondition() {
    var pool = ["ingroup", "outgroup", "no_elimination"];
    return pool[Math.floor(Math.random() * pool.length)];
}
DEBUG_CONDITION = assignCondition();
var RESPONSES_REQUIRED = false;
var STAGE1_PARTICIPANT_ID = '';
var STAGE2_URL = '';

var GOOGLE_SHEETS_WEB_APP_URL = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

function slugifyKey(value) {
    return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-zA-Z0-9а-яА-ЯёЁ]+/g, '_')
        .replace(/^_+|_+$/g, '');
}

function safeParseJSON(value) {
    if (!value) return {};
    if (typeof value === 'object') return value;
    try { return JSON.parse(value); } catch (e) { return {}; }
}

function normalizeRawRowsForSheets(rows) {
    return rows.map(function(row) {
        var copy = {};
        Object.keys(row || {}).forEach(function(key) {
            var value = row[key];
            if (value && typeof value === 'object') {
                copy[key] = JSON.stringify(value);
            } else {
                copy[key] = value;
            }
        });
        return copy;
    });
}

function buildStage1FormattedRow(participantId, ageRaw, sexRaw) {
    var allRows = jsPsych.data.get().values();
    var formatted = {
        participant_id: participantId,
        age: ageRaw || '',
        sex: sexRaw || '',
        selected_condition: DEBUG_CONDITION,
        selected_condition_label: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION
    };

    allRows.forEach(function(row) {
        if (!row) return;

        if (row.trial_type === 'ranking_result') {
            for (var i = 1; i <= 9; i++) {
                formatted['ranking_' + i] = row['ranking_' + i] || '';
            }
        }

        if (row.trial_type === 'survey-text') {
            var textResponses = safeParseJSON(row.responses);
            if (row.questionnaire_section === 'paraphrase_task') {
                formatted.paraphrase_1 = textResponses.Q0 || '';
                formatted.paraphrase_2 = textResponses.Q1 || '';
                formatted.paraphrase_3 = textResponses.Q2 || '';
            } else {
                if (textResponses.Q0 !== undefined) formatted.demographics_age = textResponses.Q0 || '';
                if (textResponses.Q1 !== undefined) formatted.demographics_class_course = textResponses.Q1 || '';
                if (textResponses.Q2 !== undefined) formatted.demographics_city = textResponses.Q2 || '';
            }
        }

        if (row.questionnaire_item === 'gender') {
            formatted.gender_label = row.gender_label || '';
            formatted.gender_code = row.gender_code || '';
        }

        if (row.trial_type === 'survey-likert') {
            var section = slugifyKey(row.questionnaire_section || row.rating_type || 'survey_likert');
            var likertResponses = safeParseJSON(row.responses || row.response);
            Object.keys(likertResponses).forEach(function(qKey) {
                var rawValue = likertResponses[qKey];
                formatted[section + '_' + qKey.toLowerCase()] = (typeof rawValue === 'number') ? rawValue + 1 : rawValue;
            });

            [
                'pakr_autonomy_mean', 'pakr_control_mean', 'pakr_total_mean',
                'bpns21_autonomy_mean', 'bpns21_competence_mean', 'bpns21_relatedness_mean', 'bpns21_total_raw_mean',
                'reactance_norm_mean', 'reactance_independence_mean', 'reactance_resistance_mean', 'reactance_emotional_mean', 'reactance_total_mean',
                'scm_warmth_mean', 'scm_competence_mean', 'scm_adults_warmth_mean', 'scm_adults_competence_mean',
                'scm_french_warmth_mean', 'scm_french_competence_mean', 'scm_teenagers_warmth_mean', 'scm_teenagers_competence_mean',
                'scm_americans_warmth_mean', 'scm_americans_competence_mean', 'scm_italians_warmth_mean', 'scm_italians_competence_mean'
            ].forEach(function(metric) {
                if (row[metric] !== undefined) formatted[metric] = row[metric];
            });
        }

        if (row.rating_type === 'personal_liking') {
            formatted['dish_' + (Number(row.dish_index) + 1) + '_name'] = row.dish || '';
            formatted['dish_' + (Number(row.dish_index) + 1) + '_personal_liking'] = safeParseJSON(row.responses).Q0 !== undefined ? safeParseJSON(row.responses).Q0 + 1 : '';
        }

        if (row.rating_type === 'expected_pleasure') {
            formatted['dish_' + (Number(row.dish_index) + 1) + '_name'] = row.dish || '';
            formatted['dish_' + (Number(row.dish_index) + 1) + '_expected_pleasure'] = safeParseJSON(row.responses).Q0 !== undefined ? safeParseJSON(row.responses).Q0 + 1 : '';
        }
    });

    return formatted;
}

function sendPayloadToGoogleSheets(payload) {
    if (!GOOGLE_SHEETS_WEB_APP_URL || GOOGLE_SHEETS_WEB_APP_URL.indexOf('PASTE_YOUR_') === 0) {
        return Promise.resolve({ skipped: true });
    }

    var body = JSON.stringify(payload);

    if (navigator.sendBeacon) {
        try {
            var blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
            var queued = navigator.sendBeacon(GOOGLE_SHEETS_WEB_APP_URL, blob);
            if (queued) {
                return Promise.resolve({ queued: true });
            }
        } catch (e) {}
    }

    return fetch('https://script.google.com/macros/s/AKfycbye3RyF0ncf0BnAlX2JS_GUGg1MyDUVpZg8DOno9s4ZBSpYJoXExmx3WpqQHZck51Vb/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body: body,
        keepalive: true
    }).then(function() {
        return { sent: true };
    });
}


        // -

        function renderRankingUI(container) {

            let html = `
              <div class="box ranking-box">
                <h3>Часть 1. Ранжирование блюд</h3>
                <p>
                  Перетащите блюда из правой колонки в левую.<br>
                  <b>1 место = блюдо, которое вы больше всего хотели бы видеть в школьном меню</b><br>
                  <b>9 место = блюдо, которое вы хотели бы видеть реже всего</b>
                </p>

                <div class="flex">

                  <div class="panel">
                    <h4>Шкала ранжирования</h4>
            `;

            ranked.forEach((item, i) => {
                html += `
                  <div class="slot" data-index="${i}">
                    <div class="slot-number">${i + 1}</div>
                    <div class="slot-content">
                      ${item ? `<div class="item" draggable="true">${item}</div>` : ""}
                    </div>
                  </div>
                `;
            });

            html += `
                  </div>

                  <div class="panel" id="poolPanel">
                    <h4>Доступные блюда</h4>
            `;

            unranked.forEach(item => {
                html += `<div class="item" draggable="true">${item}</div>`;
            });

            html += `
                  </div>
                </div>

                <br>
                <button id="rankContinue">Продолжить</button>
              </div>
            `;

            container.innerHTML = html;

            enableDnD(container);
            wireContinue(container);
        }

        // -
        // Drag and drop
        // -

        function enableDnD(container) {

            let dragged = null;

            container.querySelectorAll(".item").forEach(item => {
                item.addEventListener("dragstart", () => dragged = item.innerText);
            });

            container.querySelectorAll(".slot").forEach(slot => {

                slot.addEventListener("dragover", e => {
                    e.preventDefault();
                    slot.classList.add("drag-over");
                });

                slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));

                slot.addEventListener("drop", e => {
                    e.preventDefault();
                    slot.classList.remove("drag-over");

                    if (!dragged) return;

                    const idx = parseInt(slot.dataset.index);

                    ranked = ranked.map(x => x === dragged ? null : x);
                    unranked = unranked.filter(x => x !== dragged);

                    if (ranked[idx]) {
                        unranked.push(ranked[idx]);
                    }

                    ranked[idx] = dragged;

                    renderRankingUI(container);
                });

            });

            const pool = container.querySelector("#poolPanel");

            pool.addEventListener("dragover", e => e.preventDefault());

            pool.addEventListener("drop", e => {
                e.preventDefault();

                if (!dragged) return;

                ranked = ranked.map(x => x === dragged ? null : x);

                if (!unranked.includes(dragged)) {
                    unranked.push(dragged);
                }

                renderRankingUI(container);
            });

        }

        // -
        // Continue button
        // -

        function wireContinue(container) {

            container.querySelector("#rankContinue").onclick = function () {

                if (ranked.includes(null)) {
                    alert("Пожалуйста, расположите все блюда перед тем как продолжить.");
                    return;
                }

                jsPsych.finishTrial();
            };
        }

        // -
        // Ranking trial
        // -

        var ranking_trial = {
            type: "html-button-response",
            stimulus: `<div id="app"></div>`,
            choices: [],
            on_load: function () {
                MUST_LOOP_BACK = false;
                const container = document.getElementById("app");
                renderRankingUI(container);
            }
        };

        // -
        // Confirmation
        // -

        var confirm_trial = {
            type: "html-button-response",
            stimulus: function () {
                let html = "<div class='box'><h3>Подтверждение ранжирования</h3>";
                ranked.forEach((dish, i) => html += `<p><b>${i + 1}.</b> ${dish}</p>`);
                html += "<p>Если хотите, вы можете вернуться и изменить порядок блюд.</p>";
                html += "<button id='continueBtn'>Подтвердить и продолжить</button>";
                html += " <button id='backBtn'>Вернуться и изменить</button>";
                html += "</div>";
                return html;
            },
            choices: [],
            on_load: function () {
                document.getElementById('continueBtn').onclick = function () {
                    MUST_LOOP_BACK = false;
                    jsPsych.finishTrial();
                };

                document.getElementById('backBtn').onclick = function () {
                    MUST_LOOP_BACK = true;
                    jsPsych.finishTrial();
                };
            }
        };



var auto_condition_trial = {
    type: "call-function",
    func: function() {
        if (!DEBUG_CONDITION) {
            DEBUG_CONDITION = assignCondition();
        }
        jsPsych.data.addProperties({
            selected_condition: DEBUG_CONDITION,
            selected_condition_label: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION
        });
    }
};

        var ranking_block = {
            timeline: [ranking_trial, confirm_trial],

                    MUST_LOOP_BACK = false;
                    return true;
                }

            }

        function getStatisticsAnnotation() {
            if (DEBUG_CONDITION === "ingroup") {
                return "Из-за голосования подростков эти блюда вряд ли войдут в итоговое меню.";

                return "Из-за голосования взрослых эти блюда вряд ли войдут в итоговое меню.";
            }
            return "Эти блюда вряд ли войдут в итоговое меню.";
        }

        var statistics_screen = {

            choices: ["Продолжить"]

        // -

                { prompt: "11. Бесцельное времяпрепровождение вне дома.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "12. Разнообразные интимные (сексуальные) отношения.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "13. Ложь для оправдания своих поступков, получения материальной выгоды.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "14. Нанесение физического или морального вреда близким людям.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "15. Занятие экстремальными видами спорта (парашютизм, скейтбординг, сноубординг и т. д.).", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "16. Занятие экстремальными развлечениями (паркур, руфинг, зацепинг и т. д.).", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "17. Использование шрамирования, пирсинга, тату, туннелей в щеках и мочках уха.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "18. Употребление табачных изделий.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "19. Употребление алкогольных напитков.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "20. Употребление токсичных (наркотических) веществ для расслабления, эйфории.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "21. Участие в гонках на транспортном средстве.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "22. Совершение попыток, направленных на уход из жизни.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "23. Азартные игры с вовлечением денежных средств.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "24. Фанатическая приверженность какому-либо культу, движению.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "25. Нанесение себе умышленно телесных повреждений.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "26. Прием лекарственных препаратов в дозировках, превышающих терапевтические.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "27. Посвящение учебной или трудовой деятельности практически всего свободного времени.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED },
                { prompt: "28. Предпочтение быть наедине с собой, чем общаться с другими.", labels: ["Практически никогда", "Редко", "Иногда", "Довольно часто", "Постоянно"], required: RESPONSES_REQUIRED }
            ],
            button_label: "Продолжить",
            data: { questionnaire_section: "Sharov Deviant Activity" }
        };


        function createSCMQuestionnaire(groupKey, groupLabel) {
            return {
                type: "survey-likert",
                preamble:
                    "<h3>Оценка социальных групп</h3>" +
                    "<p>Пожалуйста, оцените, насколько, по вашему мнению, следующие характеристики подходят для группы \"" + groupLabel + "\".</p>" +
                    "<p>1 - совсем не подходит, 2 - скорее не подходит, 3 - немного не подходит, 4 - затрудняюсь ответить, 5 - немного подходит, 6 - скорее подходит, 7 - полностью подходит.</p>",
                questions: [
                    { prompt: groupLabel + ": дружелюбные", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED },
                    { prompt: groupLabel + ": искренние", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED },
                    { prompt: groupLabel + ": доброжелательные", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED },
                    { prompt: groupLabel + ": компетентные", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED },
                    { prompt: groupLabel + ": умные", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED },
                    { prompt: groupLabel + ": способные", labels: ["1","2","3","4","5","6","7"], required: RESPONSES_REQUIRED }
                ],
                button_label: "Продолжить",
                data: { questionnaire_section: "SCM", scm_group: groupKey, scm_group_label: groupLabel },
                on_finish: function(data) {
                    try {
                        var responses = JSON.parse(data.responses);
                        function mean(arr) {
                            return arr.reduce(function(a, b) { return a + b; }, 0) / arr.length;
                        }
                        var warmth_values = [0,1,2].map(function(i) { return (responses["Q" + i] || 0) + 1; });
                        var competence_values = [3,4,5].map(function(i) { return (responses["Q" + i] || 0) + 1; });
                        data.scm_warmth_mean = mean(warmth_values);
                        data.scm_competence_mean = mean(competence_values);
                        data["scm_" + groupKey + "_warmth_mean"] = data.scm_warmth_mean;
                        data["scm_" + groupKey + "_competence_mean"] = data.scm_competence_mean;
                    } catch (e) {}
                }
            };
        }

        var scm_intro = {
            type: "html-button-response",
            stimulus:
                "<div class='box'><h3>Оценка социальных групп</h3>" +
                "<p>Далее вам будет предложено оценить несколько социальных групп по ряду характеристик.</p></div>",
            choices: ["Продолжить"]
        };

        var scm_adults = createSCMQuestionnaire("adults", "Взрослые");
        var scm_french = createSCMQuestionnaire("french", "Французы");
        var scm_teenagers = createSCMQuestionnaire("teenagers", "Подростки");
        var scm_americans = createSCMQuestionnaire("americans", "Американцы");
        var scm_italians = createSCMQuestionnaire("italians", "Итальянцы");


        // -
        // Debrief
        // -

        
        var paraphrase_intro = {
            type: "html-button-response",
            stimulus:
                "<div class='box'><h3>Короткое письменное задание</h3>" +
                "<p>Перед завершением первой части выполните небольшое текстовое задание.</p>" +
                "<p>Ниже вам будут предложены 3 предложения. Переформулируйте каждое из них своими словами так, чтобы смысл сохранился.</p>" +
                "<p>Можно писать коротко. Это задание нужно для оценки письменного ответа в следующей части исследования.</p></div>",
            choices: ["Продолжить"]
        };

        var paraphrase_task = {
            type: "survey-text",
            preamble:
                "<h3>Переформулируйте предложения своими словами</h3>" +
                "<p>Старайтесь сохранить смысл, но использовать другие слова.</p>",
            questions: [
                { prompt: "1. Ребята быстро нашли решение задачи и объяснили его всему классу.", rows: 3, columns: 60, required: RESPONSES_REQUIRED },
                { prompt: "2. После уроков школьники помогли учителю подготовить кабинет к следующему занятию.", rows: 3, columns: 60, required: RESPONSES_REQUIRED },
                { prompt: "3. Несмотря на усталость, ученица внимательно закончила работу и всё перепроверила.", rows: 3, columns: 60, required: RESPONSES_REQUIRED }
            ],
            button_label: "Продолжить",
            data: { questionnaire_section: "paraphrase_task" }
        };

        
var finalize_stage1 = {
            type: "call-function",
            async: true,
            func: function (done) {
                var textTrials = jsPsych.data.get().filter({trial_type: 'survey-text'}).values();
                var demoTrial = textTrials.find(function(t) {
                    return t.responses && typeof t.responses === 'string' && t.responses.indexOf('"Q0"') !== -1;
                }) || { responses: '{}' };
                var demoResponses = (typeof demoTrial.responses === 'string') ? JSON.parse(demoTrial.responses) : (demoTrial.responses || {});
                var genderTrial = jsPsych.data.get().filter({ questionnaire_item: 'gender' }).last(1).values()[0] || {};
                STAGE1_PARTICIPANT_ID = 'P' + Date.now();

                jsPsych.data.write({
                    trial_type: "ranking_result",
                    ranking_1: ranked[0],
                    ranking_2: ranked[1],
                    ranking_3: ranked[2],
                    ranking_4: ranked[3],
                    ranking_5: ranked[4],
                    ranking_6: ranked[5],
                    ranking_7: ranked[6],
                    ranking_8: ranked[7],
                    ranking_9: ranked[8],
                    selected_condition: DEBUG_CONDITION,
                    selected_condition_label: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION,
                    participant_id: STAGE1_PARTICIPANT_ID
                });

                jsPsych.data.addProperties({
                    participant_id: STAGE1_PARTICIPANT_ID,
                    selected_condition: DEBUG_CONDITION,
                    selected_condition_label: CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION
                });

                var ageRaw = demoResponses.Q0 || '';
                var sexRaw = genderTrial.gender_label || '';
                STAGE2_URL = 'index_combined.html?participant_id=' + encodeURIComponent(STAGE1_PARTICIPANT_ID)
                    + '&age=' + encodeURIComponent(ageRaw)
                    + '&sex=' + encodeURIComponent(sexRaw)
                    + '&c=' + encodeURIComponent(CONDITION_MAP[DEBUG_CONDITION] || DEBUG_CONDITION);

                
                var rawRows = normalizeRawRowsForSheets(jsPsych.data.get().values());
                var formattedRow = buildStage1FormattedRow(STAGE1_PARTICIPANT_ID, ageRaw, sexRaw);

                sendPayloadToGoogleSheets({
                    stage: 'stage1',
                    participant_id: STAGE1_PARTICIPANT_ID,
                    raw_rows: rawRows,
                    formatted_row: formattedRow
                }).catch(function(err) {
                    console.error(err);
                }).finally(function() {
                    window.location.href = STAGE2_URL;
                    done();
                });
            }
        };

// -
        // Timeline
        // -

        var timeline = [
            intro_screen,
            auto_condition_trial,
            questionnaire_intro,
            start_questionnaire,
            start_questionnaire_gender,
            start_questionnaire_likert,
            school_needs_questionnaire,
            reactance_questionnaire,
            scm_intro,
            scm_adults,
            scm_french,
            scm_teenagers,
            scm_americans,
            scm_italians,
            deviant_activity_questionnaire,

            {
                type: "html-button-response",
                stimulus:
                    "<div class='box'><h3>Инструкция. Часть 1. Ранжирование блюд</h3>" +
                    "<p>В следующем задании вам будет предложено рассмотреть несколько блюд, которые потенциально могут быть добавлены в школьное меню.</p>" +
                    "<p>Ваша задача - расположить 9 блюд в порядке предпочтения в зависимости от того, как часто вы хотели бы видеть каждое из этих блюд в школьном меню.</p>" +
                    "<p>Расположите блюда так, чтобы на первом месте оказалось блюдо, которое вы больше всего хотели бы видеть в меню, а на последнем месте - блюдо, которое вы хотели бы видеть реже всего.</p>" +
                    "<p>Ваши ответы будут использованы в системе голосования. Если некоторые блюда окажутся непопулярными среди большинства участников, они могут быть полностью исключены из школьного меню.</p>" +
                    "<p>После того как вы завершите ранжирование, вам будет предложено подтвердить ваш выбор. Перед переходом к следующему этапу у вас будет возможность изменить порядок и заново расположить блюда, если вы захотите.</p>" +
                    "<p>Когда вы будете довольны своим выбором, подтвердите ранжирование, чтобы продолжить задание.</p></div>",
                choices: ["Продолжить"]
            },
            ranking_block,

            {
                type: "html-button-response",
                stimulus:
                    "<div class='box'><h3>Инструкция. Часть 2. Оценка того, насколько нравится блюдо</h3>" +
                    "<p>На следующем этапе вам снова будут показаны те же блюда.</p>" +
                    "<p>Теперь вам нужно оценить, насколько вам нравится каждое из этих блюд.</p>" +
                    "<p>Оценка проводится по шкале от 1 до 5. 1 - совсем не нравится. 5 - очень нравится.</p>" +
                    "<p>Пожалуйста, оценивайте каждое блюдо исходя из вашего личного мнения.</p></div>",
                choices: ["Продолжить"]
            },

            personal_ratings[0],
            personal_ratings[1],
            personal_ratings[2],

            personal_ratings[3],
            personal_ratings[4],
            personal_ratings[5],
            personal_ratings[6],
            personal_ratings[7],
            personal_ratings[8],

            {
                timeline: [statistics_screen],
                conditional_function: function() {
                    return DEBUG_CONDITION !== "no_elimination";
                }
            },

            {
                type: "html-button-response",
                stimulus:
                    "<div class='box'><h3>Инструкция. Часть 3. Повторная оценка ожидаемого удовольствия</h3>" +
                    "<p>На этом этапе вам снова будут показаны те же блюда.</p>" +
                    "<p>Теперь вам нужно оценить, какое удовольствие вы ожидали бы получить, если бы съели каждое из этих блюд.</p>" +
                    "<p>1 - совсем не получил(а) бы удовольствия. 5 - получил(а) бы большое удовольствие.</p>" +
                    "<p>Пожалуйста, оценивайте каждое блюдо исходя из вашего личного ощущения.</p></div>",
                choices: ["Продолжить"]
            },

            ...school_ratings,

            paraphrase_intro,
            paraphrase_task,
            finalize_stage1
        ];

        // -
        // Run
        // -

        jsPsych.init({
            timeline: timeline,
        });

    </script>
</body>
