<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combined Experiment</title>
  <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    body { background: white; }
    .rating-wrap {
      width: min(900px, 90vw);
      margin: 0 auto;
      text-align: center;
      color: black;
      font-family: Arial, sans-serif;
    }
    .majority-row {
      margin: 8px 0 28px;
      min-height: 34px;
      font-size: 28px;
      font-weight: 700;
      color: #0a9b32;
    }
    .scale-row {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 10px;
      align-items: center;
      justify-items: center;
      margin: 12px auto 10px;
      width: 100%;
      max-width: 820px;
    }
    .scale-cell {
      width: 100%;
      padding: 10px 0;
      border: 2px solid #000;
      border-radius: 10px;
      font-size: 24px;
      line-height: 1;
      box-sizing: border-box;
    }
    .scale-cell.highlight {
      border: 4px solid #00aa00;
      color: #00aa00;
      font-weight: 700;
    }
    .response-hint {
      margin-top: 18px;
      font-size: 18px;
    }
    .small-note {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }
    .center-big {
      font-size: 72px;
      text-align: center;
      line-height: 1;
    }
    img.face-stim {
      max-width: min(30vw, 420px);
      max-height: min(55vh, 420px);
      width: auto;
      height: auto;
    }
  </style>
</head>
<body></body>

<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/jspsych@8.2.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-call-function@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-browser-check@2.1.0"></script>
<script src="experiment_updated.js?v=20260413d"></script>
</html>
